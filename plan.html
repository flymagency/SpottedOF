<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Mon plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608; --surface: #0C0C0F; --surface2: #111115; --surface3: #18181D;
      --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.13);
      --accent: #06B6D4; --accent-light: #22D3EE; --accent-glow: rgba(6,182,212,0.16);
      --green: #1ECA6E; --yellow: #F59E0B; --pink: #F0436C; --purple: #8B5CF6;
      --text: #FFFFFF; --muted: #9898A8; --text-3: #484858;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    a, button, [onclick], select, label { cursor: pointer !important; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(6,182,212,0.07) 0%, transparent 65%),
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }
    .container { max-width: 820px; margin: 0 auto; padding: 0 24px 60px; position: relative; z-index: 1; }

    @keyframes planCardIn {
      from { opacity: 0; transform: perspective(700px) translateY(24px) rotateX(10deg); }
      to   { opacity: 1; transform: perspective(700px) translateY(0) rotateX(0deg); }
    }
    .anim-block { opacity: 0; animation: planCardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    .anim-block:nth-child(1) { animation-delay: 0.05s; }
    .anim-block:nth-child(2) { animation-delay: 0.15s; }
    .anim-block:nth-child(3) { animation-delay: 0.25s; }
    .anim-block:nth-child(4) { animation-delay: 0.32s; }

    /* HEADER */
    header { padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 40px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-text { font-size: 20px; font-weight: 800; font-family: 'Outfit', sans-serif; }
    .logo-text span { color: var(--accent); }
    .btn { padding: 8px 18px; font-size: 13px; border-radius: 10px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-cta { display: inline-flex; align-items: center; gap: 8px; background: var(--accent); color: white; padding: 12px 24px; border-radius: 12px; font-size: 14px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; box-shadow: 0 0 24px rgba(6,182,212,0.3); transition: all 0.2s; text-decoration: none; }
    .btn-cta:hover { background: var(--accent-light); box-shadow: 0 0 32px rgba(6,182,212,0.45); transform: translateY(-1px); }

    /* PAGE HEADER */
    .page-eyebrow { font-size: 10px; font-family: 'Space Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }

    /* PLAN CARD */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px 32px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .plan-card::before {
      content: ''; position: absolute; top: -60px; right: -60px;
      width: 240px; height: 240px; border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.10) 0%, transparent 65%);
      pointer-events: none;
    }
    .plan-card.superadmin-card::before {
      background: radial-gradient(circle, rgba(139,92,246,0.12) 0%, transparent 65%);
    }
    .plan-badge-active {
      position: absolute; top: 20px; right: 20px;
      font-family: 'Space Mono', monospace; font-size: 10px; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
      border-radius: 6px; padding: 4px 10px;
    }
    .plan-eyebrow {
      font-family: 'Space Mono', monospace; font-size: 10px; color: var(--accent);
      text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 10px;
    }
    .plan-name { font-family: 'Outfit', sans-serif; font-size: 36px; font-weight: 900; line-height: 1; margin-bottom: 6px; }
    .plan-price { font-size: 14px; color: var(--muted); margin-bottom: 24px; }

    /* META INFOS */
    .plan-meta { display: flex; gap: 24px; margin-bottom: 28px; flex-wrap: wrap; }
    .plan-meta-item { display: flex; flex-direction: column; gap: 4px; }
    .plan-meta-label { font-family: 'Space Mono', monospace; font-size: 9px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .plan-meta-value { font-size: 13px; font-weight: 600; color: var(--text); }

    /* USAGE BARS */
    .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .usage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .usage-label { font-family: 'Space Mono', monospace; font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); }
    .usage-value { font-family: 'Outfit', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); }
    .bar-track { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); }

    /* FEATURES */
    .features-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 28px 32px;
      margin-bottom: 16px;
    }
    .features-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 20px; }
    .features-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .feature-item {
      display: flex; align-items: flex-start; gap: 10px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 12px; padding: 12px 14px;
    }
    .feature-item.locked { opacity: 0.4; }
    .feat-icon { width: 28px; height: 28px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
    .feat-icon.ok { background: rgba(30,202,110,0.12); }
    .feat-icon.no { background: rgba(255,255,255,0.04); }
    .feat-text { display: flex; flex-direction: column; gap: 2px; }
    .feat-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .feat-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }

    /* UPGRADE SECTION */
    .upgrade-section { margin-bottom: 16px; }
    .upgrade-section-title { font-family: 'Outfit', sans-serif; font-size: 16px; font-weight: 800; margin-bottom: 16px; }
    .upgrade-cards-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .upgrade-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      position: relative;
      transition: border-color 0.2s, transform 0.2s;
    }
    .upgrade-card.featured {
      border-color: rgba(6,182,212,0.35);
      background: linear-gradient(135deg, rgba(6,182,212,0.04) 0%, var(--surface) 60%);
    }
    .upgrade-card:hover { transform: translateY(-2px); }
    .upgrade-popular { position: absolute; top: -11px; left: 50%; transform: translateX(-50%); background: var(--accent); color: white; font-size: 10px; font-weight: 700; font-family: 'Space Mono', monospace; padding: 3px 12px; border-radius: 20px; white-space: nowrap; letter-spacing: 0.05em; }
    .upgrade-plan-name { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 4px; }
    .upgrade-price-row { display: flex; align-items: flex-end; gap: 6px; margin: 12px 0 16px; }
    .upgrade-price { font-family: 'Outfit', sans-serif; font-size: 34px; font-weight: 900; line-height: 1; }
    .upgrade-period { font-size: 13px; color: var(--muted); margin-bottom: 4px; }
    .upgrade-gains { display: flex; flex-direction: column; gap: 6px; margin-bottom: 20px; }
    .upgrade-gain { display: flex; align-items: flex-start; gap: 8px; font-size: 12px; color: var(--muted); }
    .upgrade-gain span:first-child { color: var(--accent); font-weight: 700; flex-shrink: 0; }
    .upgrade-gain.new-feat { color: var(--text); font-weight: 500; }
    .upgrade-gain.new-feat span:first-child { color: var(--green); }
    .btn-upgrade { width: 100%; padding: 11px; border-radius: 12px; font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.2s; text-align: center; }
    .btn-upgrade.primary { background: var(--accent); color: white; box-shadow: 0 0 20px rgba(6,182,212,0.25); }
    .btn-upgrade.primary:hover { background: var(--accent-light); box-shadow: 0 0 28px rgba(6,182,212,0.4); transform: translateY(-1px); }
    .btn-upgrade.ghost { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-upgrade.ghost:hover { border-color: var(--accent); color: var(--accent); }

    /* UPGRADE MODAL */
    .upgrade-modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(4px); }
    .upgrade-modal { background: var(--surface); border: 1px solid var(--border-light); border-radius: 20px; width: 100%; max-width: 420px; padding: 28px; box-shadow: 0 24px 60px rgba(0,0,0,0.5); }
    .upgrade-modal-title { font-family: 'Outfit', sans-serif; font-size: 20px; font-weight: 800; margin-bottom: 8px; }
    .upgrade-modal-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 24px; }
    .upgrade-modal-info { background: var(--surface2); border-radius: 12px; padding: 14px 16px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; font-size: 13px; }

    @media (max-width: 600px) {
      .upgrade-cards-row { grid-template-columns: 1fr; }
    }

    /* NOTIFICATION PANEL */
    .notif-wrap { position: relative; }
    #notifPanel { display:none; position:absolute; right:0; top:44px; background:var(--surface); border:1px solid var(--border-light); border-radius:16px; width:320px; z-index:200; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); }

    @media (max-width: 600px) {
      .usage-grid, .features-grid { grid-template-columns: 1fr; }
      .plan-name { font-size: 28px; }
      .plan-meta { gap: 16px; }
    }
  </style>
</head>
<body>
<div class="container">

      <a href="app.html" class="logo">

            <rect width="36" height="36" rx="9" fill="#0C0C0F"/>

        <a href="app.html" class="btn btn-ghost">← Dashboard</a>

  </header>

  <div style="display:flex;flex-direction:column;gap:0">

    <!-- BLOC 1 : PLAN ACTUEL -->
    <div class="anim-block">
      <div class="plan-card" id="planCard">
        <div class="plan-badge-active" id="planBadge">ACTIF</div>
        <div class="plan-eyebrow">PLAN ACTUEL</div>
        <div class="plan-name" id="planName">—</div>
        <div class="plan-price" id="planPrice"></div>

        <div class="plan-meta" id="planMeta"></div>

        <div class="usage-grid">
          <div class="usage-item">
            <div class="usage-header">
              <span class="usage-label">Scans utilisés</span>
              <span class="usage-value" id="scansValue">—</span>
            </div>
            <div class="bar-track"><div class="bar-fill" id="scansBar" style="width:0%;background:var(--accent)"></div></div>
          </div>
          <div class="usage-item">
            <div class="usage-header">
              <span class="usage-label">Prospects trouvés</span>
              <span class="usage-value" id="prospectsValue">—</span>

            <div class="bar-track"><div class="bar-fill" id="prospectsBar" style="width:0%;background:rgba(255,255,255,0.3)"></div></div>
          </div>

    <!-- BLOC 2 : FONCTIONNALITÉS -->
    <div class="anim-block">
      <div class="features-card">
        <div class="features-title">Fonctionnalités incluses</div>
        <div class="features-grid" id="featuresGrid"></div>
      </div>

    <!-- BLOC 3 : UPGRADE -->
    <div class="anim-block" id="upgradeBlock" style="display:none">
      <div class="upgrade-section">
        <div class="upgrade-section-title">Évoluer vers un plan supérieur</div>
        <div class="upgrade-cards-row" id="upgradeCardsRow"></div>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
const WORKER = 'https://spottedof-worker.businessflymagency.workers.dev';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
function esc(str) {
  if (str == null) return '';
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

const PLANS = {
  starter:    { name: 'Starter',     price: '49€',  period: '49€ / mois',  limit: 200 },
  pro:        { name: 'Pro',         price: '99€',  period: '99€ / mois',  limit: Infinity },
  agency:     { name: 'Agency',      price: '199€', period: '199€ / mois', limit: Infinity },
  admin:      { name: 'Super Admin', price: '—',    period: '—',           limit: Infinity },
  superadmin: { name: 'Super Admin', price: '—',    period: '—',           limit: Infinity },
};

const PLAN_FEATURES = {
  starter: [
    { icon: '🔍', name: 'Scan Instagram',         desc: 'Analyse de profils via Phantombuster', ok: true },
    { icon: '🤖', name: 'Score IA',               desc: 'Scoring automatique 0–100%',           ok: true },
    { icon: '📋', name: 'Jusqu\'à 200 prospects', desc: 'Par cycle de facturation',              ok: true },
    { icon: '💾', name: 'Export basique',          desc: 'Export de ta liste en CSV',            ok: true },
    { icon: '📊', name: 'Statistiques avancées',  desc: 'Charts & analytics',                   ok: false },
    { icon: '📝', name: 'Notes & Tags',            desc: 'Annoter chaque prospect',              ok: false },
    { icon: '📄', name: 'Export PDF',              desc: 'Rapport complet en PDF',               ok: false },
    { icon: '👥', name: 'Multi-utilisateurs',      desc: 'Accès pour ton équipe',                ok: false },
    { icon: '📅', name: 'Scans planifiés',         desc: 'Automatisation & récurrence',          ok: false },
  ],
  pro: [
    { icon: '🔍', name: 'Scan Instagram',         desc: 'Analyse de profils via Phantombuster', ok: true },
    { icon: '🤖', name: 'Score IA',               desc: 'Scoring automatique 0–100%',           ok: true },
    { icon: '♾️', name: 'Prospects illimités',    desc: 'Aucune limite de volume',              ok: true },
    { icon: '🌐', name: 'Multi-plateformes',      desc: 'Instagram, TikTok, Threads',           ok: true },
    { icon: '📊', name: 'Statistiques avancées',  desc: 'Charts & analytics détaillés',         ok: true },
    { icon: '📝', name: 'Notes & Tags',            desc: 'Annoter et trier tes prospects',       ok: true },
    { icon: '📄', name: 'Export PDF',              desc: 'Rapport complet en PDF',               ok: true },
    { icon: '👥', name: 'Multi-utilisateurs',      desc: 'Accès pour ton équipe',                ok: false },
    { icon: '📅', name: 'Scans planifiés',         desc: 'Automatisation & récurrence',          ok: false },
  ],
  agency: [
    { icon: '🔍', name: 'Scan Instagram',         desc: 'Analyse de profils via Phantombuster', ok: true },
    { icon: '🤖', name: 'Score IA',               desc: 'Scoring automatique 0–100%',           ok: true },
    { icon: '♾️', name: 'Prospects illimités',    desc: 'Aucune limite de volume',              ok: true },
    { icon: '🌐', name: 'Multi-plateformes',      desc: 'Instagram, TikTok, Threads',           ok: true },
    { icon: '📊', name: 'Statistiques avancées',  desc: 'Charts & analytics détaillés',         ok: true },
    { icon: '📝', name: 'Notes & Tags',            desc: 'Annoter et trier tes prospects',       ok: true },
    { icon: '📄', name: 'Export PDF',              desc: 'Rapport complet en PDF',               ok: true },
    { icon: '👥', name: 'Multi-utilisateurs',      desc: 'Équipe + gestion des rôles',           ok: true },
    { icon: '📅', name: 'Scans planifiés',         desc: 'Automatisation & récurrence',          ok: true },
  ],
};
PLAN_FEATURES.admin      = PLAN_FEATURES.agency.map(f => ({ ...f, ok: true })).concat([
  { icon: '⚡', name: 'Accès fondateur', desc: 'Toutes les fonctionnalités, pour toujours', ok: true },
]);
PLAN_FEATURES.superadmin = PLAN_FEATURES.admin;

const UPGRADE_NEXT = {
  starter: { next: 'pro',    name: 'Pro',    price: '99€',  desc: 'Prospects illimités, statistiques avancées, notes et export PDF.' },
  pro:     { next: 'agency', name: 'Agency', price: '199€', desc: 'Tout le plan Pro, multi-utilisateurs, scans planifiés et support prioritaire.' },
};

function fmtDate(dateStr) {
  if (!dateStr) return '—';
  return new Date(dateStr).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' });
}

function renewalDate(createdAt) {
  if (!createdAt) return null;
  const d = new Date(createdAt);
  const now = new Date();
  // Avancer mois par mois jusqu'à une date future
  while (d <= now) d.setMonth(d.getMonth() + 1);
  return d;
}

sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  const user = data.session.user;
  document.getElementById('headerEmail').textContent = user.email;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  const plan    = (profile?.plan || 'starter').toLowerCase();
  const paid    = profile?.paid || false;
  const startDate = profile?.created_at || null;

  renderPlan(plan, paid, startDate);
  await renderUsage(plan);
  renderFeatures(plan);
  renderUpgrade(plan);
  loadNotifications();
});

function renderPlan(plan, paid, startDate) {
  const p = PLANS[plan] || PLANS.starter;
  const isSuperAdmin = plan === 'admin' || plan === 'superadmin';

  document.getElementById('planName').textContent = p.name;
  document.getElementById('planPrice').textContent = isSuperAdmin ? 'Fondateur · Accès illimité' : p.period;

  // Badge
  const badge = document.getElementById('planBadge');
  if (isSuperAdmin) {
    badge.textContent = 'SUPER ADMIN';
    badge.style.cssText += ';color:#8B5CF6;background:rgba(139,92,246,0.1);border:1px solid rgba(139,92,246,0.3)';
    document.getElementById('planCard').classList.add('superadmin-card');
  } else if (paid) {
    badge.textContent = 'ACTIF';
    badge.style.cssText += ';color:var(--accent);background:rgba(6,182,212,0.1);border:1px solid rgba(6,182,212,0.25)';
  } else {
    badge.textContent = 'EN ATTENTE';
    badge.style.cssText += ';color:#F0436C;background:rgba(240,67,108,0.1);border:1px solid rgba(240,67,108,0.25)';
  }

  // Meta infos
  const meta = document.getElementById('planMeta');
  const items = [];

  if (startDate) {
    items.push({ label: 'Membre depuis', value: fmtDate(startDate) });
  }

  if (!isSuperAdmin && paid && startDate) {
    const renewal = renewalDate(startDate);
    if (renewal) items.push({ label: 'Prochain renouvellement', value: fmtDate(renewal) });
    items.push({ label: 'Tarif', value: p.price + ' / mois' });
  }

  if (isSuperAdmin) {
    items.push({ label: 'Renouvellement', value: 'Aucun — accès permanent' });
  }

  meta.innerHTML = items.map(item => `
    <div class="plan-meta-item">
      <div class="plan-meta-label">${item.label}</div>
      <div class="plan-meta-value">${item.value}</div>
    </div>
  `).join('');
}

function renderFeatures(plan) {
  const features = PLAN_FEATURES[plan] || PLAN_FEATURES.starter;
  const grid = document.getElementById('featuresGrid');
  grid.innerHTML = features.map(f => `
    <div class="feature-item ${f.ok ? '' : 'locked'}">
      <div class="feat-icon ${f.ok ? 'ok' : 'no'}">${f.ok ? '✓' : '✕'}</div>
      <div class="feat-text">
        <div class="feat-name">${f.name}</div>
        <div class="feat-desc">${f.desc}</div>
      </div>
    </div>
  `).join('');
}

async function renderUsage(plan) {
  const limit = PLANS[plan]?.limit || 200;
  try {
    const res = await fetch(`${WORKER}/stats`);
    const stats = await res.json();
    const total = stats.total || 0;
    const scans = stats.scans || total;
    const scanPct    = limit === Infinity ? 6 : Math.min(100, Math.round(scans / limit * 100));
    const prospectPct = limit === Infinity ? 6 : Math.min(100, Math.round(total / limit * 100));
    document.getElementById('scansValue').textContent = scans;
    document.getElementById('scansBar').style.width = `${scanPct}%`;
    document.getElementById('prospectsValue').textContent = total;
    document.getElementById('prospectsBar').style.width = `${prospectPct}%`;
  } catch(e) {
    document.getElementById('scansValue').textContent = '—';
    document.getElementById('prospectsValue').textContent = '—';
  }
}

/* ─── NOTIFICATIONS ─── */
const NOTIF_SEEN_KEY = 'spottedof_seen_notifs';
function getSeenNotifs() { try { return new Set(JSON.parse(localStorage.getItem(NOTIF_SEEN_KEY) || '[]')); } catch { return new Set(); } }
function saveSeenNotifs(set) { localStorage.setItem(NOTIF_SEEN_KEY, JSON.stringify([...set])); }
let _allNotifTickets = [];

async function loadNotifications() {
  const { data: tickets } = await sb.from('tickets').select('*').eq('status', 'resolved').order('created_at', { ascending: false });
  _allNotifTickets = tickets || [];
  _renderNotifBadge();
}
function _renderNotifBadge() {
  const seen = getSeenNotifs();
  const unread = _allNotifTickets.filter(t => !seen.has(t.id));
  const count = document.getElementById('notifCount');
  if (unread.length > 0) {
    count.textContent = unread.length;
    count.style.cssText = 'display:flex;position:absolute;top:-5px;right:-5px;background:#F0436C;color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:50%;padding:0 3px;justify-content:center;align-items:center';
  } else { count.style.display = 'none'; }
}
function _renderNotifPanel() {
  const list = document.getElementById('notifList');
  const seen = getSeenNotifs();
  const CAT_LABELS = { paiement:'💳 Paiement', compte:'🔐 Compte', bug:'🐛 Bug', fonctionnalite:'✨ Fonctionnalité', upgrade:'⬆️ Upgrade', autre:'💬 Autre' };
  if (!_allNotifTickets.length) { list.innerHTML = `<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">Aucune notification</div>`; return; }
  list.innerHTML = _allNotifTickets.map(t => {
    const isNew = !seen.has(t.id);
    const date = t.resolved_at ? new Date(t.resolved_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div onclick="markNotifRead('${t.id}',this)" style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;${isNew?'background:rgba(240,67,108,0.05)':''}">
      <div style="font-size:20px;flex-shrink:0">${isNew ? '🔴' : '✅'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;margin-bottom:3px">Ticket résolu${isNew ? ' <span style="color:#F0436C;font-size:9px;background:rgba(240,67,108,0.1);padding:1px 5px;border-radius:4px;">NEW</span>' : ''}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${CAT_LABELS[t.category] || esc(t.category)}</div>
        <div style="font-size:11px;color:var(--text-3);font-family:'Space Mono',monospace">${date}</div>
      </div>
    </div>`;
  }).join('') + (_allNotifTickets.some(t => !seen.has(t.id)) ? `<div style="padding:10px;text-align:center;"><button onclick="markAllNotifsRead()" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;">Tout marquer comme lu</button></div>` : '');
}
function markNotifRead(id, el) {
  const seen = getSeenNotifs(); seen.add(id); saveSeenNotifs(seen);
  el.style.background = ''; el.querySelector('div:first-child').textContent = '✅';
  const title = el.querySelector('div:last-child div:first-child');
  if (title) title.innerHTML = 'Ticket résolu';
  _renderNotifBadge();
}
function markAllNotifsRead() {
  const seen = getSeenNotifs(); _allNotifTickets.forEach(t => seen.add(t.id)); saveSeenNotifs(seen);
  _renderNotifBadge(); _renderNotifPanel();
}
function toggleNotifPanel() {
  const panel = document.getElementById('notifPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) _renderNotifPanel();
}
document.addEventListener('click', e => {
  if (!document.getElementById('notifBtn')?.contains(e.target)) {
    const panel = document.getElementById('notifPanel');
    if (panel) panel.style.display = 'none';
  }
});
</script>
