<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Mon plan</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608; --surface: #0C0C0F; --surface2: #111115; --surface3: #18181D;
      --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.13);
      --accent: #06B6D4; --accent-light: #22D3EE; --accent-glow: rgba(6,182,212,0.16);
      --text: #FFFFFF; --muted: #9898A8; --text-3: #484858;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(6,182,212,0.07) 0%, transparent 65%),
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }
    .container { max-width: 760px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    /* ANIMATIONS */
    @keyframes planCardIn {
      from { opacity: 0; transform: perspective(700px) translateY(24px) rotateX(10deg); }
      to   { opacity: 1; transform: perspective(700px) translateY(0) rotateX(0deg); }
    }
    .anim-block {
      opacity: 0;
      animation: planCardIn 0.55s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    }
    .anim-block:nth-child(1) { animation-delay: 0.05s; }
    .anim-block:nth-child(2) { animation-delay: 0.15s; }
    .anim-block:nth-child(3) { animation-delay: 0.25s; }

    /* HEADER */
    header { padding: 24px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 48px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; }
    .logo { display: flex; align-items: center; gap: 10px; text-decoration: none; color: var(--text); }
    .logo-text { font-size: 20px; font-weight: 800; font-family: 'Outfit', sans-serif; }
    .logo-text span { color: var(--accent); }
    .btn { padding: 8px 18px; font-size: 13px; border-radius: 10px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.2s; text-decoration: none; display: inline-flex; align-items: center; gap: 6px; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }

    /* PAGE HEADER */
    .page-header { margin-bottom: 32px; }
    .page-eyebrow { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--accent); text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 8px; }
    .page-title { font-size: 28px; font-weight: 700; font-family: 'Outfit', sans-serif; }

    /* PLAN CARD */
    .plan-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .plan-card::before {
      content: '';
      position: absolute;
      top: -60px; right: -60px;
      width: 240px; height: 240px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(6,182,212,0.12) 0%, transparent 65%);
      pointer-events: none;
    }
    .plan-badge-active {
      position: absolute;
      top: 20px; right: 20px;
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--accent);
      background: rgba(6,182,212,0.1);
      border: 1px solid rgba(6,182,212,0.25);
      border-radius: 6px;
      padding: 4px 10px;
    }
    .plan-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .plan-name {
      font-family: 'Outfit', sans-serif;
      font-size: 36px;
      font-weight: 900;
      line-height: 1;
      margin-bottom: 6px;
    }
    .plan-price {
      font-size: 14px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* USAGE BARS */
    .usage-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .usage-item {}
    .usage-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .usage-label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
    }
    .usage-value {
      font-family: 'Outfit', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
    }
    .bar-track { height: 4px; background: var(--surface3); border-radius: 2px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 2px; transition: width 0.9s cubic-bezier(0.22,1,0.36,1); }

    /* UPGRADE CARD */
    .upgrade-card {
      background: var(--surface);
      border: 1px solid rgba(6,182,212,0.18);
      border-radius: 20px;
      padding: 32px;
      margin-bottom: 20px;
    }
    .upgrade-eyebrow {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 10px;
    }
    .upgrade-plan-name {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }
    .upgrade-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 20px;
    }
    .upgrade-price-row { display: flex; align-items: flex-end; gap: 10px; margin-bottom: 24px; }
    .upgrade-price {
      font-family: 'Outfit', sans-serif;
      font-size: 40px;
      font-weight: 900;
      line-height: 1;
    }
    .upgrade-period { font-size: 14px; color: var(--muted); margin-bottom: 4px; }
    .btn-cta {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--accent);
      color: white;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      box-shadow: 0 0 24px rgba(6,182,212,0.3);
      transition: all 0.2s;
      text-decoration: none;
    }
    .btn-cta:hover { background: var(--accent-light); box-shadow: 0 0 32px rgba(6,182,212,0.45); transform: translateY(-1px); }

    /* NOTIFICATION PANEL */
    .notif-wrap { position: relative; }
    #notifPanel { display:none; position:absolute; right:0; top:44px; background:var(--surface); border:1px solid var(--border-light); border-radius:16px; width:320px; z-index:200; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.5); }

    @media (max-width: 600px) {
      .usage-grid { grid-template-columns: 1fr; }
      .plan-name { font-size: 28px; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <a href="app.html" class="logo">
        <div style="width:36px;height:36px;flex-shrink:0">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
            <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#06B6D4"/><stop offset="100%" style="stop-color:#F0436C"/></linearGradient></defs>
            <rect width="36" height="36" rx="9" fill="#0C0C0F"/>
            <circle cx="18" cy="18" r="12" fill="none" stroke="url(#lg)" stroke-width="0.9" opacity="0.4"/>
            <circle cx="18" cy="18" r="7.5" fill="none" stroke="url(#lg)" stroke-width="0.9" opacity="0.65"/>
            <circle cx="18" cy="18" r="3" fill="none" stroke="url(#lg)" stroke-width="1.1"/>
            <line x1="18" y1="18" x2="26.5" y2="9.5" stroke="url(#lg)" stroke-width="1.6" stroke-linecap="round"/>
            <circle cx="26.5" cy="9.5" r="2.2" fill="#F0436C"/>
            <text x="18" y="22.5" text-anchor="middle" fill="white" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="8.5">S</text>
          </svg>
        </div>
        <div class="logo-text">Spotted<span>OF</span></div>
      </a>
      <div style="display:flex;gap:10px;align-items:center">
        <span id="headerEmail" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></span>
        <div class="notif-wrap">
          <button id="notifBtn" onclick="toggleNotifPanel()" style="background:var(--surface2);border:1px solid var(--border);border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative">
            🔔
            <span id="notifCount" style="display:none;position:absolute;top:-5px;right:-5px;background:#F0436C;color:white;font-size:9px;font-weight:700;font-family:'Space Mono',monospace;min-width:16px;height:16px;border-radius:50%;padding:0 3px;justify-content:center;align-items:center"></span>
          </button>
          <div id="notifPanel">
            <div style="padding:14px 16px;border-bottom:1px solid var(--border);font-size:13px;font-weight:700">Notifications</div>
            <div id="notifList" style="max-height:300px;overflow-y:auto"></div>
          </div>
        </div>
        <a href="app.html" class="btn btn-ghost">← Dashboard</a>
      </div>
    </div>
  </header>

  <div style="display:flex;flex-direction:column;gap:0">

    <!-- BLOC 1 : PLAN ACTUEL -->
    <div class="anim-block">
      <div class="plan-card" id="planCard">
        <div class="plan-badge-active" id="planBadge">ACTIF</div>
        <div class="plan-eyebrow">PLAN ACTUEL</div>
        <div class="plan-name" id="planName">—</div>
        <div class="plan-price" id="planPrice"></div>
        <div class="usage-grid">
          <div class="usage-item">
            <div class="usage-header">
              <span class="usage-label">Scans utilisés</span>
              <span class="usage-value" id="scansValue">—</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="scansBar" style="width:0%;background:var(--accent)"></div>
            </div>
          </div>
          <div class="usage-item">
            <div class="usage-header">
              <span class="usage-label">Prospects trouvés</span>
              <span class="usage-value" id="prospectsValue">—</span>
            </div>
            <div class="bar-track">
              <div class="bar-fill" id="prospectsBar" style="width:0%;background:rgba(255,255,255,0.3)"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- BLOC 2 : UPGRADE -->
    <div class="anim-block" id="upgradeBlock" style="display:none">
      <div class="upgrade-card">
        <div class="upgrade-eyebrow" id="upgradeEyebrow">PROCHAINE ÉTAPE</div>
        <div class="upgrade-plan-name" id="upgradeNextName">—</div>
        <div class="upgrade-desc" id="upgradeNextDesc"></div>
        <div class="upgrade-price-row">
          <div class="upgrade-price" id="upgradeNextPrice">—</div>
          <div class="upgrade-period">/ mois</div>
        </div>
        <a id="upgradeBtn" href="#" class="btn-cta">Passer à <span id="upgradeBtnLabel">—</span> →</a>
      </div>
    </div>

  </div>
</div>

<script>
const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
const WORKER = 'https://spottedof-worker.businessflymagency.workers.dev';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const PLANS = {
  starter: { name: 'Starter', price: '49€', period: '49€ / mois', limit: 200 },
  pro:     { name: 'Pro',     price: '99€', period: '99€ / mois', limit: Infinity },
  agency:  { name: 'Agency',  price: '199€', period: '199€ / mois', limit: Infinity },
  admin:   { name: 'Admin',   price: '—',   period: '—',           limit: Infinity },
};

const UPGRADE_NEXT = {
  starter: {
    next: 'pro',
    name: 'Pro',
    price: '99€',
    desc: 'Prospects illimités, statistiques avancées, notes prospects et cross-platform finder.',
  },
  pro: {
    next: 'agency',
    name: 'Agency',
    price: '199€',
    desc: 'Tout le plan Pro, multi-utilisateurs, support prioritaire 24/7 et onboarding personnalisé.',
  },
};

sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  const user = data.session.user;
  document.getElementById('headerEmail').textContent = user.email;

  const { data: profile } = await sb.from('profiles').select('*').eq('id', user.id).single();
  const plan = (profile?.plan || 'starter').toLowerCase();
  const paid = profile?.paid || false;

  renderPlan(plan, paid);
  await renderUsage(plan);
  renderUpgrade(plan);
  loadNotifications();
});

function renderPlan(plan, paid) {
  const p = PLANS[plan] || PLANS.starter;
  document.getElementById('planName').textContent = p.name;
  document.getElementById('planPrice').textContent = plan !== 'admin' ? p.period : '';

  const badge = document.getElementById('planBadge');
  if (paid || plan === 'admin') {
    badge.textContent = 'ACTIF';
    badge.style.color = 'var(--accent)';
    badge.style.background = 'rgba(6,182,212,0.1)';
    badge.style.borderColor = 'rgba(6,182,212,0.25)';
  } else {
    badge.textContent = 'EN ATTENTE';
    badge.style.color = '#F0436C';
    badge.style.background = 'rgba(240,67,108,0.1)';
    badge.style.borderColor = 'rgba(240,67,108,0.25)';
  }
}

async function renderUsage(plan) {
  const limit = PLANS[plan]?.limit || 200;

  try {
    const res = await fetch(`${WORKER}/stats`);
    const stats = await res.json();
    const total = stats.total || 0;
    const scans = stats.scans || total; // fallback to total if no scans key

    const scanPct = limit === Infinity ? 8 : Math.min(100, Math.round(scans / limit * 100));
    const prospectPct = limit === Infinity ? 8 : Math.min(100, Math.round(total / limit * 100));

    document.getElementById('scansValue').textContent = scans;
    document.getElementById('scansBar').style.width = `${scanPct}%`;

    document.getElementById('prospectsValue').textContent = total;
    document.getElementById('prospectsBar').style.width = `${prospectPct}%`;
  } catch(e) {
    document.getElementById('scansValue').textContent = '—';
    document.getElementById('prospectsValue').textContent = '—';
  }
}

function renderUpgrade(plan) {
  if (plan === 'admin' || plan === 'agency') return;
  const info = UPGRADE_NEXT[plan];
  if (!info) return;

  document.getElementById('upgradeBlock').style.display = 'block';
  document.getElementById('upgradeNextName').textContent = info.name;
  document.getElementById('upgradeNextDesc').textContent = info.desc;
  document.getElementById('upgradeNextPrice').textContent = info.price;
  document.getElementById('upgradeBtnLabel').textContent = info.name;
  document.getElementById('upgradeBtn').href =
    `mailto:businessflymagency@gmail.com?subject=Upgrade vers ${info.name}&body=Bonjour, je souhaite passer au plan ${info.name} (${info.price}/mois).`;
}

/* ─── NOTIFICATIONS ─── */
const NOTIF_SEEN_KEY = 'spottedof_seen_notifs';
function getSeenNotifs() {
  try { return new Set(JSON.parse(localStorage.getItem(NOTIF_SEEN_KEY) || '[]')); } catch { return new Set(); }
}
function saveSeenNotifs(set) { localStorage.setItem(NOTIF_SEEN_KEY, JSON.stringify([...set])); }

let _allNotifTickets = [];

async function loadNotifications() {
  const { data: tickets } = await sb.from('tickets')
    .select('*').eq('status', 'resolved').order('created_at', { ascending: false });
  _allNotifTickets = tickets || [];
  _renderNotifBadge();
}

function _renderNotifBadge() {
  const seen = getSeenNotifs();
  const unread = _allNotifTickets.filter(t => !seen.has(t.id));
  const count = document.getElementById('notifCount');
  if (unread.length > 0) {
    count.textContent = unread.length;
    count.style.cssText = 'display:flex;position:absolute;top:-5px;right:-5px;background:#F0436C;color:white;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:50%;padding:0 3px;justify-content:center;align-items:center';
  } else {
    count.style.display = 'none';
  }
}

function _renderNotifPanel() {
  const list = document.getElementById('notifList');
  const seen = getSeenNotifs();
  const CAT_LABELS = { paiement:'💳 Paiement', compte:'🔐 Compte', bug:'🐛 Bug', fonctionnalite:'✨ Fonctionnalité', upgrade:'⬆️ Upgrade', autre:'💬 Autre' };

  if (!_allNotifTickets.length) {
    list.innerHTML = `<div style="padding:20px;text-align:center;font-size:12px;color:var(--muted)">Aucune notification</div>`;
    return;
  }
  list.innerHTML = _allNotifTickets.map(t => {
    const isNew = !seen.has(t.id);
    const date = t.resolved_at ? new Date(t.resolved_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' }) : '';
    return `<div onclick="markNotifRead('${t.id}',this)" style="padding:14px 16px;border-bottom:1px solid var(--border);display:flex;gap:12px;align-items:flex-start;cursor:pointer;${isNew?'background:rgba(240,67,108,0.05)':''}">
      <div style="font-size:20px;flex-shrink:0">${isNew ? '🔴' : '✅'}</div>
      <div style="flex:1;min-width:0">
        <div style="font-size:13px;font-weight:700;margin-bottom:3px">Ticket résolu${isNew ? ' <span style="color:#F0436C;font-size:9px;background:rgba(240,67,108,0.1);padding:1px 5px;border-radius:4px;">NEW</span>' : ''}</div>
        <div style="font-size:12px;color:var(--muted);margin-bottom:4px">${CAT_LABELS[t.category] || t.category}</div>
        <div style="font-size:11px;color:var(--text-3);font-family:'Space Mono',monospace">${date}</div>
      </div>
    </div>`;
  }).join('') + (_allNotifTickets.some(t => !seen.has(t.id)) ? `<div style="padding:10px;text-align:center;"><button onclick="markAllNotifsRead()" style="font-size:11px;color:var(--muted);background:none;border:none;cursor:pointer;text-decoration:underline;font-family:'Inter',sans-serif;">Tout marquer comme lu</button></div>` : '');
}

function markNotifRead(id, el) {
  const seen = getSeenNotifs(); seen.add(id); saveSeenNotifs(seen);
  el.style.background = ''; el.querySelector('div:first-child').textContent = '✅';
  const title = el.querySelector('div:last-child div:first-child');
  if (title) title.innerHTML = 'Ticket résolu';
  _renderNotifBadge();
}
function markAllNotifsRead() {
  const seen = getSeenNotifs(); _allNotifTickets.forEach(t => seen.add(t.id)); saveSeenNotifs(seen);
  _renderNotifBadge(); _renderNotifPanel();
}

function toggleNotifPanel() {
  const panel = document.getElementById('notifPanel');
  const isOpen = panel.style.display !== 'none';
  panel.style.display = isOpen ? 'none' : 'block';
  if (!isOpen) _renderNotifPanel();
}

document.addEventListener('click', e => {
  if (!document.getElementById('notifBtn')?.contains(e.target)) {
    const panel = document.getElementById('notifPanel');
    if (panel) panel.style.display = 'none';
  }
});
</script>
</body>
</html>
