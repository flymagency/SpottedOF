<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608; --surface: #0C0C0F; --surface2: #111115; --surface3: #18181D;
      --border: rgba(255,255,255,0.07); --border-light: rgba(255,255,255,0.13);
      --accent: #06B6D4; --accent-light: #22D3EE; --accent-glow: rgba(6,182,212,0.16);
      --accent2: #F0436C;
      --green: #1ECA6E; --yellow: #F59E0B; --pink: #F0436C;
      --text: #FFFFFF; --muted: #9898A8; --text-3: #484858;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 50% at 50% -10%, rgba(6,182,212,0.07) 0%, transparent 65%),
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    header { padding: 28px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-text { font-size: 20px; font-weight: 800; }
    .logo-text span { color: var(--accent); }
    .admin-badge { font-family: 'Space Mono', monospace; font-size: 10px; background: rgba(245,158,11,0.12); color: var(--yellow); border: 1px solid rgba(245,158,11,0.25); border-radius: 6px; padding: 2px 8px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn { padding: 8px 16px; font-size: 12px; border-radius: 10px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: var(--accent-light); }
    .btn-red { background: rgba(240,67,108,0.12); color: var(--accent2); border: 1px solid rgba(240,67,108,0.25); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* CLIENTS TABLE */
    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 32px; }
    .table-head { display: grid; grid-template-columns: 2.2fr 1fr 1fr 80px 100px 1fr 44px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); gap: 12px; }
    .th { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .client-row { display: grid; grid-template-columns: 2.2fr 1fr 1fr 80px 100px 1fr 44px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; gap: 12px; }
    .client-row:last-child { border-bottom: none; }
    .client-row:hover { background: var(--surface2); }
    .cell { font-size: 13px; }
    .cell-mono { font-family: 'Space Mono', monospace; font-size: 11px; }
    .client-email { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .client-agency { font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-family: 'Space Mono', monospace; font-weight: 700; }
    .badge-admin { background: rgba(245,158,11,0.1); color: var(--yellow); border: 1px solid rgba(245,158,11,0.25); }
    .badge-free { background: rgba(152,152,168,0.12); color: var(--muted); border: 1px solid var(--border); }
    .badge-starter { background: rgba(6,182,212,0.1); color: var(--accent); border: 1px solid rgba(6,182,212,0.25); }
    .badge-pro { background: rgba(30,202,110,0.1); color: var(--green); border: 1px solid rgba(30,202,110,0.25); }
    .badge-agency { background: rgba(240,67,108,0.1); color: var(--pink); border: 1px solid rgba(240,67,108,0.25); }
    .badge-paid { background: rgba(30,202,110,0.1); color: var(--green); border: 1px solid rgba(30,202,110,0.25); }
    .badge-unpaid { background: rgba(240,67,108,0.1); color: var(--accent2); border: 1px solid rgba(240,67,108,0.25); }

    .actions-cell { display: flex; gap: 6px; justify-content: flex-end; }
    .icon-btn { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all 0.2s; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* MODAL EDIT */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border-light); border-radius: 20px; width: 100%; max-width: 460px; overflow: hidden; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 800; }
    .modal-close { width: 28px; height: 28px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; }
    .form-label { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 13px; outline: none; cursor: pointer; }

    /* TICKETS */
    .ticket-row { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 2fr 100px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; gap: 12px; font-size: 13px; }
    .ticket-row:last-child { border-bottom: none; }
    .ticket-row.unread { background: rgba(240,67,108,0.05); }
    .ticket-head { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr 2fr 100px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); }
    .cat-badge { font-size:10px;font-family:'Space Mono',monospace;padding:3px 8px;border-radius:6px;font-weight:700;background:rgba(6,182,212,0.1);color:#06B6D4;border:1px solid rgba(6,182,212,0.25); }
    .status-open { color:#F0436C;font-family:'Space Mono',monospace;font-size:10px;font-weight:700; }
    .status-resolved { color:#1ECA6E;font-family:'Space Mono',monospace;font-size:10px;font-weight:700; }

    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .empty-sub { font-size: 12px; color: var(--muted); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface3); border: 1px solid var(--border-light); border-radius: 12px; padding: 12px 18px; font-size: 13px; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(30,202,110,0.4); color: var(--green); }
    .toast.error { border-color: rgba(240,67,108,0.4); color: var(--accent2); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .table-head, .client-row { grid-template-columns: 2fr 1fr 1fr 44px; gap: 12px; }
      .th:nth-child(4),.th:nth-child(5),.th:nth-child(6),
      .client-row>*:nth-child(4),.client-row>*:nth-child(5),.client-row>*:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:16px">
        <a href="app.html" class="logo">
          <div class="logo-icon" style="background:none;padding:0;overflow:visible">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 36 36" width="36" height="36">
              <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#06B6D4"/><stop offset="100%" style="stop-color:#F0436C"/></linearGradient></defs>
              <rect width="36" height="36" rx="9" fill="#0C0C0F"/>
              <circle cx="18" cy="18" r="12" fill="none" stroke="url(#lg)" stroke-width="0.9" opacity="0.4"/>
              <circle cx="18" cy="18" r="7.5" fill="none" stroke="url(#lg)" stroke-width="0.9" opacity="0.65"/>
              <circle cx="18" cy="18" r="3" fill="none" stroke="url(#lg)" stroke-width="1.1"/>
              <line x1="18" y1="18" x2="26.5" y2="9.5" stroke="url(#lg)" stroke-width="1.6" stroke-linecap="round"/>
              <circle cx="26.5" cy="9.5" r="2.2" fill="#F0436C"/>
              <text x="18" y="22.5" text-anchor="middle" fill="white" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="8.5">S</text>
            </svg>
          </div>
          <div class="logo-text">Spotted<span>OF</span></div>
        </a>
        <span class="admin-badge">⚡ ADMIN</span>
      </div>
      <div class="header-right">
        <span id="adminEmail" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></span>
        <a href="app.html" class="btn btn-ghost">← Dashboard</a>
        <button class="btn btn-ghost" onclick="signOut()">Déconnexion</button>
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card" style="border-color:rgba(6,182,212,0.3)">
      <div class="stat-label">Total clients</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">comptes actifs</div>
    </div>
    <div class="stat-card" style="border-color:rgba(30,202,110,0.25)">
      <div class="stat-label">Payants</div>
      <div class="stat-value" id="statPaid" style="color:var(--green)">—</div>
      <div class="stat-sub" id="statMRR">MRR : —</div>
    </div>
    <div class="stat-card" style="border-color:rgba(245,158,11,0.25)">
      <div class="stat-label">Gratuits</div>
      <div class="stat-value" id="statFree" style="color:var(--yellow)">—</div>
      <div class="stat-sub">à convertir</div>
    </div>
    <div class="stat-card" style="border-color:rgba(240,67,108,0.25)">
      <div class="stat-label">Ce mois</div>
      <div class="stat-value" id="statNew" style="color:var(--pink)">—</div>
      <div class="stat-sub">nouvelles inscriptions</div>
    </div>
  </div>

  <!-- TABLE CLIENTS -->
  <div class="section-title">
    Clients
    <button class="btn btn-primary" onclick="loadClients()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Actualiser
    </button>
  </div>
  <div class="table-wrap">
    <div class="table-head">
      <div class="th">Client</div>
      <div class="th">Plan</div>
      <div class="th">Paiement</div>
      <div class="th">Prospects</div>
      <div class="th">Inscription</div>
      <div class="th">Notes</div>
      <div class="th"></div>
    </div>
    <div id="clientList"></div>
  </div>

  <!-- TICKETS SUPPORT -->
  <div class="section-title" style="margin-top:40px">
    <div style="display:flex;align-items:center;gap:10px">
      🎫 Tickets support
      <span id="ticketBadge" style="display:none;background:#F0436C;color:white;font-size:10px;font-weight:700;font-family:'Space Mono',monospace;padding:2px 8px;border-radius:100px"></span>
    </div>
    <button class="btn btn-ghost" onclick="loadTickets()" style="font-size:12px">Actualiser</button>
  </div>
  <div class="table-wrap" style="margin-bottom:40px">
    <div id="ticketList">
      <div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Chargement...</div>
    </div>
  </div>
</div>

<!-- MODAL EDIT CLIENT -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">Modifier le client</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div>
        <label class="form-label">Email</label>
        <input class="form-input" id="editEmail" disabled style="opacity:0.5">
      </div>
      <div>
        <label class="form-label">Agence</label>
        <input class="form-input" id="editAgency" placeholder="Nom de l'agence">
      </div>
      <div>
        <label class="form-label">Plan</label>
        <select class="form-select" id="editPlan">
          <option value="free">Free</option>
          <option value="starter">Starter</option>
          <option value="pro">Pro</option>
          <option value="agency">Agency</option>
          <option value="member">Member (invité équipe)</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div>
        <label class="form-label">Statut paiement</label>
        <select class="form-select" id="editPaid">
          <option value="false">Non payé</option>
          <option value="true">Payé ✓</option>
        </select>
      </div>
      <div>
        <label class="form-label">Notes internes</label>
        <input class="form-input" id="editNotes" placeholder="Remarques, suivi...">
      </div>

      <!-- ZONE ACTIONS -->
      <div style="border-top:1px solid var(--border);padding-top:14px;display:flex;flex-direction:column;gap:8px">
        <div style="font-size:10px;font-family:'Space Mono',monospace;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:2px">Actions</div>
        <button class="btn btn-ghost" style="justify-content:flex-start;gap:8px;font-size:12px" onclick="sendPasswordReset()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Envoyer un lien de réinitialisation du mot de passe
        </button>
        <button class="btn btn-red" style="justify-content:flex-start;gap:8px;font-size:12px" onclick="confirmDeleteClient()">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          Supprimer le compte
        </button>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="flex:1" onclick="saveClient()">Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
const WORKER = 'https://spottedof-worker.businessflymagency.workers.dev';
const ADMIN_EMAIL = 'businessflymagency@gmail.com';
const PLAN_PRICES = { free: 0, starter: 70, pro: 100, agency: 200, admin: 0 };

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let clients = [];

// Auth + admin check
sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  if (data.session.user.email !== ADMIN_EMAIL) { window.location.href = 'app.html'; return; }
  document.getElementById('adminEmail').textContent = data.session.user.email;
  loadClients();
  loadTickets();
});

async function loadClients() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Erreur chargement clients', 'error'); return; }
  clients = data || [];
  renderStats();
  renderClients();
}

function renderStats() {
  const now = new Date();
  const thisMonth = clients.filter(c => new Date(c.created_at).getMonth() === now.getMonth());
  const paid = clients.filter(c => c.paid);
  const free = clients.filter(c => !c.paid && c.plan === 'free');
  const mrr = paid.reduce((s, c) => s + (PLAN_PRICES[c.plan] || 0), 0);

  document.getElementById('statTotal').textContent = clients.length;
  document.getElementById('statPaid').textContent = paid.length;
  document.getElementById('statMRR').textContent = `MRR : ${mrr}€/mois`;
  document.getElementById('statFree').textContent = free.length;
  document.getElementById('statNew').textContent = thisMonth.length;
}

function planBadge(plan) {
  const map = { free: 'badge-free', starter: 'badge-starter', pro: 'badge-pro', agency: 'badge-agency', admin: 'badge-admin' };
  return `<span class="badge ${map[plan]||'badge-free'}">${plan||'free'}</span>`;
}

function dateFmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderClients() {
  const el = document.getElementById('clientList');
  if (!clients.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Aucun client</div><div class="empty-sub">Les inscriptions apparaîtront ici</div></div>`;
    return;
  }
  el.innerHTML = clients.map(c => `
    <div class="client-row">
      <div style="min-width:0">
        <div class="client-email" title="${c.email || ''}">${c.email || '—'}</div>
        <div class="client-agency">${c.agency_name || '—'}</div>
      </div>
      <div class="cell">${planBadge(c.plan)}</div>
      <div class="cell">
        <span class="badge ${c.paid ? 'badge-paid' : 'badge-unpaid'}">${c.paid ? 'Payé ✓' : 'Impayé'}</span>
      </div>
      <div class="cell-mono" style="font-size:12px;font-weight:700;color:var(--text)">${c.prospects_count || 0}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${dateFmt(c.created_at)}</div>
      <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.notes || '—'}</div>
      <div class="actions-cell">
        <button onclick="editClient('${c.id}')" style="background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:6px 14px;font-size:12px;font-weight:700;color:var(--accent);cursor:pointer;font-family:'Inter',sans-serif;transition:all 0.2s;white-space:nowrap" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">
          Gérer →
        </button>
      </div>
    </div>`).join('');
}

function editClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  document.getElementById('editId').value = c.id;
  document.getElementById('editEmail').value = c.email || '';
  document.getElementById('editAgency').value = c.agency_name || '';
  document.getElementById('editPlan').value = c.plan || 'free';
  document.getElementById('editPaid').value = String(c.paid || false);
  document.getElementById('editNotes').value = c.notes || '';
  document.getElementById('editModal').classList.add('open');
}

async function saveClient() {
  const id = document.getElementById('editId').value;
  const updates = {
    agency_name: document.getElementById('editAgency').value,
    plan: document.getElementById('editPlan').value,
    paid: document.getElementById('editPaid').value === 'true',
    notes: document.getElementById('editNotes').value,
  };
  const { error } = await sb.from('profiles').update(updates).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast('Client mis à jour ✓', 'success');
  closeModal();
  loadClients();
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }
async function signOut() { await sb.auth.signOut(); window.location.href = 'login.html'; }

async function sendPasswordReset() {
  const email = document.getElementById('editEmail').value;
  if (!email) return;
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://spottedof.com/reset-password.html'
  });
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast('📧 Email de réinitialisation envoyé à ' + email, 'success');
}

async function confirmDeleteClient() {
  const id = document.getElementById('editId').value;
  const email = document.getElementById('editEmail').value;
  try {
    const res = await fetch(WORKER + '/delete-user', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: id })
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || 'Erreur serveur');
    showToast('🗑️ Compte supprimé', 'success');
    closeModal();
    loadClients();
  } catch (err) {
    showToast('Erreur suppression : ' + err.message, 'error');
  }
}

/* ─── TICKETS SUPPORT ─── */
const CAT_LABELS = {
  paiement: '💳 Paiement', compte: '🔐 Compte', bug: '🐛 Bug',
  fonctionnalite: '✨ Fonctionnalité', upgrade: '⬆️ Upgrade', autre: '💬 Autre'
};

async function loadTickets() {
  // Admin peut tout lire — besoin d'une policy SELECT pour admin
  const { data: tickets, error } = await sb.from('tickets').select('*').order('created_at', { ascending: false });
  const list = document.getElementById('ticketList');
  const badge = document.getElementById('ticketBadge');

  if (error || !tickets || tickets.length === 0) {
    list.innerHTML = `<div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">🎉 Aucun ticket ouvert</div>`;
    badge.style.display = 'none';
    return;
  }

  const openCount = tickets.filter(t => t.status === 'open').length;
  if (openCount > 0) {
    badge.textContent = `${openCount} nouveau${openCount > 1 ? 'x' : ''}`;
    badge.style.display = 'inline';
  } else {
    badge.style.display = 'none';
  }

  list.innerHTML = `
    <div class="ticket-head">
      <div class="th">Client</div>
      <div class="th">Plan</div>
      <div class="th">Catégorie</div>
      <div class="th">Date</div>
      <div class="th">Message</div>
      <div class="th"></div>
    </div>
    ${tickets.map(t => {
      const date = new Date(t.created_at).toLocaleDateString('fr-FR', { day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit' });
      const planColor = { starter:'#06B6D4', pro:'#1ECA6E', agency:'#F0436C', admin:'#F59E0B' }[t.plan?.toLowerCase()] || '#9898A8';
      return `<div class="ticket-row ${t.status==='open'?'unread':''}">
        <div>
          <div style="font-weight:700;font-size:12px">${t.agency_name || '—'}</div>
          <div style="font-size:10px;color:var(--muted);font-family:'Space Mono',monospace;margin-top:2px">${t.email || ''}</div>
        </div>
        <div><span style="font-size:10px;font-family:'Space Mono',monospace;font-weight:700;color:${planColor}">${(t.plan||'—').toUpperCase()}</span></div>
        <div><span class="cat-badge">${CAT_LABELS[t.category] || t.category}</span></div>
        <div style="font-size:11px;color:var(--muted);font-family:'Space Mono',monospace">${date}</div>
        <div style="font-size:12px;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${t.message}">${t.message}</div>
        <div style="display:flex;gap:6px;justify-content:flex-end">
          ${t.status === 'open'
            ? `<button onclick="resolveTicket('${t.id}')" style="background:rgba(30,202,110,0.1);color:#1ECA6E;border:1px solid rgba(30,202,110,0.25);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:700;cursor:pointer;font-family:'Inter',sans-serif">✓ Résolu</button>`
            : `<span class="status-resolved">✓ Résolu</span>`}
          <button onclick="replyTicket('${t.email}','${(t.agency_name||'').replace(/'/g,"\\'")}','${t.category}')" style="background:var(--surface2);color:var(--muted);border:1px solid var(--border);padding:5px 10px;border-radius:7px;font-size:11px;cursor:pointer;font-family:'Inter',sans-serif">↩ Répondre</button>
        </div>
      </div>`;
    }).join('')}`;
}

async function resolveTicket(id) {
  await sb.from('tickets').update({ status: 'resolved', resolved_at: new Date().toISOString() }).eq('id', id);
  showToast('✅ Ticket marqué comme résolu', 'success');
  loadTickets();
}

function replyTicket(email, agency, category) {
  const subject = encodeURIComponent(`[SpottedOF Support] Réponse à ta demande — ${CAT_LABELS[category] || category}`);
  const body = encodeURIComponent(`Bonjour ${agency},\n\nSuite à ta demande concernant "${CAT_LABELS[category] || category}", voici notre réponse :\n\n[Ta réponse ici]\n\nL'équipe SpottedOF`);
  window.open(`https://mail.google.com/mail/?view=cm&fs=1&to=${encodeURIComponent(email)}&su=${subject}&body=${body}`, '_blank');
}
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
