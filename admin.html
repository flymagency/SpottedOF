<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #0a0a0f; --surface: #111118; --surface2: #1a1a24; --border: #2a2a3a;
      --accent: #7c5cfc; --accent2: #fc5c7c; --green: #2dfc8e; --yellow: #fcdc2d;
      --pink: #fc5cdc; --text: #e8e8f0; --muted: #6b6b88;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Syne', sans-serif; min-height: 100vh; }
    body::before { content: ''; position: fixed; inset: 0; background-image: linear-gradient(rgba(124,92,252,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(124,92,252,0.03) 1px, transparent 1px); background-size: 40px 40px; pointer-events: none; z-index: 0; }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; position: relative; z-index: 1; }

    header { padding: 28px 0 20px; border-bottom: 1px solid var(--border); margin-bottom: 32px; }
    .header-inner { display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .logo { display: flex; align-items: center; gap: 12px; text-decoration: none; color: var(--text); }
    .logo-icon { width: 36px; height: 36px; background: linear-gradient(135deg, var(--accent), var(--pink)); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
    .logo-text { font-size: 20px; font-weight: 800; }
    .logo-text span { color: var(--pink); }
    .admin-badge { font-family: 'Space Mono', monospace; font-size: 10px; background: rgba(252,220,45,0.15); color: var(--yellow); border: 1px solid rgba(252,220,45,0.3); border-radius: 6px; padding: 2px 8px; }
    .header-right { display: flex; align-items: center; gap: 10px; }
    .btn { padding: 8px 16px; font-size: 12px; border-radius: 10px; font-weight: 700; font-family: 'Syne', sans-serif; cursor: pointer; border: none; transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px; text-decoration: none; }
    .btn-ghost { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .btn-ghost:hover { border-color: var(--accent); color: var(--text); }
    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #9b7ffd; }
    .btn-red { background: rgba(252,92,124,0.15); color: var(--accent2); border: 1px solid rgba(252,92,124,0.3); }

    /* STATS */
    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 20px 24px; }
    .stat-label { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; }
    .stat-value { font-size: 28px; font-weight: 800; line-height: 1; }
    .stat-sub { font-size: 11px; color: var(--muted); margin-top: 6px; }

    /* CLIENTS TABLE */
    .section-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
    .table-wrap { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; overflow: hidden; margin-bottom: 32px; }
    .table-head { display: grid; grid-template-columns: 2.2fr 1fr 1fr 80px 100px 1fr 44px; padding: 10px 20px; border-bottom: 1px solid var(--border); background: var(--surface2); gap: 12px; }
    .th { font-family: 'Space Mono', monospace; font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; }
    .client-row { display: grid; grid-template-columns: 2.2fr 1fr 1fr 80px 100px 1fr 44px; padding: 14px 20px; border-bottom: 1px solid var(--border); align-items: center; transition: background 0.15s; gap: 12px; }
    .client-row:last-child { border-bottom: none; }
    .client-row:hover { background: rgba(124,92,252,0.04); }
    .cell { font-size: 13px; }
    .cell-mono { font-family: 'Space Mono', monospace; font-size: 11px; }
    .client-email { font-family: 'Space Mono', monospace; font-size: 11px; font-weight: 400; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; }
    .client-agency { font-size: 12px; font-weight: 600; color: var(--muted); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 100px; font-size: 10px; font-family: 'Space Mono', monospace; font-weight: 700; }
    .badge-admin { background: rgba(252,220,45,0.12); color: var(--yellow); border: 1px solid rgba(252,220,45,0.3); }
    .badge-free { background: rgba(107,107,136,0.15); color: var(--muted); border: 1px solid var(--border); }
    .badge-starter { background: rgba(124,92,252,0.12); color: var(--accent); border: 1px solid rgba(124,92,252,0.3); }
    .badge-pro { background: rgba(45,252,142,0.12); color: var(--green); border: 1px solid rgba(45,252,142,0.3); }
    .badge-agency { background: rgba(252,92,220,0.12); color: var(--pink); border: 1px solid rgba(252,92,220,0.3); }
    .badge-paid { background: rgba(45,252,142,0.12); color: var(--green); border: 1px solid rgba(45,252,142,0.3); }
    .badge-unpaid { background: rgba(252,92,124,0.12); color: var(--accent2); border: 1px solid rgba(252,92,124,0.3); }

    .actions-cell { display: flex; gap: 6px; justify-content: flex-end; }
    .icon-btn { width: 28px; height: 28px; border-radius: 7px; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 1px solid var(--border); background: var(--surface2); color: var(--muted); transition: all 0.2s; }
    .icon-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* MODAL EDIT */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(4px); z-index: 100; display: none; align-items: center; justify-content: center; padding: 24px; }
    .modal-overlay.open { display: flex; }
    .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; width: 100%; max-width: 460px; overflow: hidden; }
    .modal-header { padding: 20px 24px 16px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .modal-title { font-size: 15px; font-weight: 800; }
    .modal-close { width: 28px; height: 28px; border-radius: 7px; background: var(--surface2); border: 1px solid var(--border); color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 14px; }
    .modal-body { padding: 20px 24px; display: flex; flex-direction: column; gap: 14px; }
    .modal-footer { padding: 0 24px 20px; display: flex; gap: 10px; }
    .form-label { font-size: 11px; font-family: 'Space Mono', monospace; color: var(--muted); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); }
    .form-select { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 14px; color: var(--text); font-family: 'Syne', sans-serif; font-size: 13px; outline: none; cursor: pointer; }

    .empty-state { text-align: center; padding: 60px 24px; }
    .empty-icon { font-size: 40px; margin-bottom: 12px; }
    .empty-title { font-size: 16px; font-weight: 800; margin-bottom: 6px; }
    .empty-sub { font-size: 12px; color: var(--muted); }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 12px 18px; font-size: 13px; z-index: 200; transform: translateY(80px); opacity: 0; transition: all 0.3s; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .toast.success { border-color: rgba(45,252,142,0.4); color: var(--green); }
    .toast.error { border-color: rgba(252,92,124,0.4); color: var(--accent2); }

    @media (max-width: 900px) {
      .stats-row { grid-template-columns: 1fr 1fr; }
      .table-head, .client-row { grid-template-columns: 2fr 1fr 1fr 44px; gap: 12px; }
      .th:nth-child(4),.th:nth-child(5),.th:nth-child(6),
      .client-row>*:nth-child(4),.client-row>*:nth-child(5),.client-row>*:nth-child(6) { display: none; }
    }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="header-inner">
      <div style="display:flex;align-items:center;gap:16px">
        <a href="app.html" class="logo">
          <div class="logo-icon">🎯</div>
          <div class="logo-text">Spotted<span>OF</span></div>
        </a>
        <span class="admin-badge">⚡ ADMIN</span>
      </div>
      <div class="header-right">
        <span id="adminEmail" style="font-family:'Space Mono',monospace;font-size:11px;color:var(--muted)"></span>
        <a href="app.html" class="btn btn-ghost">← Dashboard</a>
        <button class="btn btn-ghost" onclick="signOut()">Déconnexion</button>
      </div>
    </div>
  </header>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card" style="border-color:rgba(124,92,252,0.4)">
      <div class="stat-label">Total clients</div>
      <div class="stat-value" id="statTotal">—</div>
      <div class="stat-sub">comptes actifs</div>
    </div>
    <div class="stat-card" style="border-color:rgba(45,252,142,0.3)">
      <div class="stat-label">Payants</div>
      <div class="stat-value" id="statPaid" style="color:var(--green)">—</div>
      <div class="stat-sub" id="statMRR">MRR : —</div>
    </div>
    <div class="stat-card" style="border-color:rgba(252,220,45,0.3)">
      <div class="stat-label">Gratuits</div>
      <div class="stat-value" id="statFree" style="color:var(--yellow)">—</div>
      <div class="stat-sub">à convertir</div>
    </div>
    <div class="stat-card" style="border-color:rgba(252,92,220,0.3)">
      <div class="stat-label">Ce mois</div>
      <div class="stat-value" id="statNew" style="color:var(--pink)">—</div>
      <div class="stat-sub">nouvelles inscriptions</div>
    </div>
  </div>

  <!-- TABLE CLIENTS -->
  <div class="section-title">
    Clients
    <button class="btn btn-primary" onclick="loadClients()">
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 1 0 .49-3.51"/></svg>
      Actualiser
    </button>
  </div>
  <div class="table-wrap">
    <div class="table-head">
      <div class="th">Client</div>
      <div class="th">Plan</div>
      <div class="th">Paiement</div>
      <div class="th">Prospects</div>
      <div class="th">Inscription</div>
      <div class="th">Notes</div>
      <div class="th"></div>
    </div>
    <div id="clientList"></div>
  </div>
</div>

<!-- MODAL EDIT CLIENT -->
<div class="modal-overlay" id="editModal">
  <div class="modal">
    <div class="modal-header">
      <div class="modal-title" id="editModalTitle">Modifier le client</div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body">
      <input type="hidden" id="editId">
      <div>
        <label class="form-label">Email</label>
        <input class="form-input" id="editEmail" disabled style="opacity:0.5">
      </div>
      <div>
        <label class="form-label">Agence</label>
        <input class="form-input" id="editAgency" placeholder="Nom de l'agence">
      </div>
      <div>
        <label class="form-label">Plan</label>
        <select class="form-select" id="editPlan">
          <option value="free">Free</option>
          <option value="starter">Starter</option>
          <option value="pro">Pro</option>
          <option value="agency">Agency</option>
          <option value="admin">Admin</option>
        </select>
      </div>
      <div>
        <label class="form-label">Statut paiement</label>
        <select class="form-select" id="editPaid">
          <option value="false">Non payé</option>
          <option value="true">Payé ✓</option>
        </select>
      </div>
      <div>
        <label class="form-label">Notes internes</label>
        <input class="form-input" id="editNotes" placeholder="Remarques, suivi...">
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn btn-primary" style="flex:1" onclick="saveClient()">Enregistrer</button>
      <button class="btn btn-ghost" onclick="closeModal()">Annuler</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
const ADMIN_EMAIL = 'businessflymagency@gmail.com';
const PLAN_PRICES = { free: 0, starter: 50, pro: 100, agency: 200, admin: 0 };

const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
let clients = [];

// Auth + admin check
sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'login.html'; return; }
  if (data.session.user.email !== ADMIN_EMAIL) { window.location.href = 'app.html'; return; }
  document.getElementById('adminEmail').textContent = data.session.user.email;
  loadClients();
});

async function loadClients() {
  const { data, error } = await sb.from('profiles').select('*').order('created_at', { ascending: false });
  if (error) { showToast('Erreur chargement clients', 'error'); return; }
  clients = data || [];
  renderStats();
  renderClients();
}

function renderStats() {
  const now = new Date();
  const thisMonth = clients.filter(c => new Date(c.created_at).getMonth() === now.getMonth());
  const paid = clients.filter(c => c.paid);
  const free = clients.filter(c => !c.paid && c.plan === 'free');
  const mrr = paid.reduce((s, c) => s + (PLAN_PRICES[c.plan] || 0), 0);

  document.getElementById('statTotal').textContent = clients.length;
  document.getElementById('statPaid').textContent = paid.length;
  document.getElementById('statMRR').textContent = `MRR : ${mrr}€/mois`;
  document.getElementById('statFree').textContent = free.length;
  document.getElementById('statNew').textContent = thisMonth.length;
}

function planBadge(plan) {
  const map = { free: 'badge-free', starter: 'badge-starter', pro: 'badge-pro', agency: 'badge-agency', admin: 'badge-admin' };
  return `<span class="badge ${map[plan]||'badge-free'}">${plan||'free'}</span>`;
}

function dateFmt(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'short', year: 'numeric' });
}

function renderClients() {
  const el = document.getElementById('clientList');
  if (!clients.length) {
    el.innerHTML = `<div class="empty-state"><div class="empty-icon">👥</div><div class="empty-title">Aucun client</div><div class="empty-sub">Les inscriptions apparaîtront ici</div></div>`;
    return;
  }
  el.innerHTML = clients.map(c => `
    <div class="client-row">
      <div style="min-width:0">
        <div class="client-email" title="${c.email || ''}">${c.email || '—'}</div>
        <div class="client-agency">${c.agency_name || '—'}</div>
      </div>
      <div class="cell">${planBadge(c.plan)}</div>
      <div class="cell">
        <span class="badge ${c.paid ? 'badge-paid' : 'badge-unpaid'}">${c.paid ? 'Payé ✓' : 'Impayé'}</span>
      </div>
      <div class="cell-mono" style="font-size:12px;font-weight:700;color:var(--text)">${c.prospects_count || 0}</div>
      <div style="font-family:'Space Mono',monospace;font-size:10px;color:var(--muted)">${dateFmt(c.created_at)}</div>
      <div style="font-size:11px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.notes || '—'}</div>
      <div class="actions-cell">
        <div class="icon-btn" onclick="editClient('${c.id}')" title="Modifier">
          <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </div>
      </div>
    </div>`).join('');
}

function editClient(id) {
  const c = clients.find(x => x.id === id);
  if (!c) return;
  document.getElementById('editId').value = c.id;
  document.getElementById('editEmail').value = c.email || '';
  document.getElementById('editAgency').value = c.agency_name || '';
  document.getElementById('editPlan').value = c.plan || 'free';
  document.getElementById('editPaid').value = String(c.paid || false);
  document.getElementById('editNotes').value = c.notes || '';
  document.getElementById('editModal').classList.add('open');
}

async function saveClient() {
  const id = document.getElementById('editId').value;
  const updates = {
    agency_name: document.getElementById('editAgency').value,
    plan: document.getElementById('editPlan').value,
    paid: document.getElementById('editPaid').value === 'true',
    notes: document.getElementById('editNotes').value,
  };
  const { error } = await sb.from('profiles').update(updates).eq('id', id);
  if (error) { showToast('Erreur : ' + error.message, 'error'); return; }
  showToast('Client mis à jour ✓', 'success');
  closeModal();
  loadClients();
}

function closeModal() { document.getElementById('editModal').classList.remove('open'); }
async function signOut() { await sb.auth.signOut(); window.location.href = 'login.html'; }
function showToast(msg, type='success') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 3000);
}
document.getElementById('editModal').addEventListener('click', e => { if (e.target === e.currentTarget) closeModal(); });
</script>
</body>
</html>
