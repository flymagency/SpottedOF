<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f4f5f9; --surface: #ffffff; --surface2: #f0f1f6; --border: #e2e4ec;
      --accent: #4f46e5; --accent2: #e8445a; --green: #059669; --yellow: #d97706;
      --pink: #db2777; --text: #0f1117; --muted: #6b7280;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 24px; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; padding: 48px; width: 100%; max-width: 420px; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }

    .logo { display: flex; align-items: center; gap: 12px; margin-bottom: 32px; justify-content: center; }
    .logo-icon { width: 44px; height: 44px; background: #0f1117; border-radius: 12px; display: flex; align-items: center; justify-content: center; overflow: hidden; }
    .logo-text { font-size: 26px; font-weight: 800; }
    .logo-text span { color: var(--pink); }

    .tab-row { display: flex; gap: 4px; background: var(--surface2); border-radius: 12px; padding: 4px; margin-bottom: 28px; }
    .tab { flex: 1; padding: 9px; border-radius: 9px; font-size: 13px; font-weight: 700; cursor: pointer; border: none; background: none; color: var(--muted); font-family: 'Inter', sans-serif; transition: all 0.2s; text-align: center; }
    .tab.active { background: var(--accent); color: white; box-shadow: 0 2px 8px rgba(79,70,229,0.3); }

    .form-group { margin-bottom: 16px; }
    .form-label { font-size: 11px; color: var(--muted); font-family: 'Space Mono', monospace; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; display: block; }
    .form-input { width: 100%; background: var(--surface2); border: 1.5px solid var(--border); border-radius: 12px; padding: 13px 16px; color: var(--text); font-family: 'Inter', sans-serif; font-size: 14px; outline: none; transition: border-color 0.2s; }
    .form-input:focus { border-color: var(--accent); background: white; }
    .form-input::placeholder { color: var(--muted); }

    .btn { width: 100%; padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; font-family: 'Inter', sans-serif; cursor: pointer; border: none; transition: all 0.2s; margin-top: 8px; }
    .btn-primary { background: linear-gradient(135deg, var(--accent), var(--pink)); color: white; box-shadow: 0 4px 14px rgba(79,70,229,0.3); }
    .btn-primary:hover { opacity: 0.92; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(79,70,229,0.4); }
    .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .alert { border-radius: 10px; padding: 12px 16px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert-error { background: rgba(232,68,90,0.08); border: 1px solid rgba(232,68,90,0.2); color: var(--accent2); }
    .alert-success { background: rgba(5,150,105,0.08); border: 1px solid rgba(5,150,105,0.2); color: var(--green); }

    .divider { text-align: center; margin: 20px 0; font-size: 12px; color: var(--muted); }
    a { color: var(--accent); font-weight: 600; text-decoration: none; }
    a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-icon">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 44 44" width="44" height="44">
        <defs><linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#6366f1"/><stop offset="100%" style="stop-color:#ec4899"/></linearGradient></defs>
        <rect width="44" height="44" rx="12" fill="#0f1117"/>
        <circle cx="22" cy="22" r="15" fill="none" stroke="url(#lg)" stroke-width="1" opacity="0.4"/>
        <circle cx="22" cy="22" r="9.5" fill="none" stroke="url(#lg)" stroke-width="1" opacity="0.65"/>
        <circle cx="22" cy="22" r="4" fill="none" stroke="url(#lg)" stroke-width="1.3"/>
        <line x1="22" y1="22" x2="33" y2="11" stroke="url(#lg)" stroke-width="2" stroke-linecap="round"/>
        <circle cx="33" cy="11" r="3" fill="#ec4899"/>
        <text x="22" y="27" text-anchor="middle" fill="white" font-family="Inter,Arial,sans-serif" font-weight="900" font-size="11">S</text>
      </svg>
    </div>
    <div class="logo-text">Spotted<span>OF</span></div>
  </div>

  <div class="tab-row">
    <button class="tab active" onclick="setMode('login',this)">Connexion</button>
    <button class="tab" onclick="setMode('register',this)">Inscription</button>
  </div>

  <div id="alertError" class="alert alert-error"></div>
  <div id="alertSuccess" class="alert alert-success"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="email" placeholder="ton@email.com">
  </div>
  <div class="form-group" id="groupPassword">
    <label class="form-label">Mot de passe</label>
    <input type="password" class="form-input" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submit()">
  </div>
  <div class="form-group" id="groupAgency" style="display:none">
    <label class="form-label">Nom de ton agence</label>
    <input type="text" class="form-input" id="agency" placeholder="FlyMagency">
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="submit()">Se connecter</button>

  <div class="divider" id="forgotWrap" style="margin-top:16px">
    <a href="#" onclick="forgotPassword()">Mot de passe oublié ?</a>
  </div>
  <div style="text-align:center;margin-top:12px;font-size:13px;color:var(--muted)">
    Pas encore de compte ? <a href="register.html">Créer mon compte →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  let mode = 'login';

  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'app.html';
  });

  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('groupAgency').style.display = m === 'register' ? 'block' : 'none';
    document.getElementById('forgotWrap').style.display = m === 'login' ? 'block' : 'none';
    document.getElementById('submitBtn').textContent = m === 'login' ? 'Se connecter' : "Créer mon compte";
    hideAlerts();
  }

  async function submit() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    hideAlerts();

    if (!email || !password) { showError('Remplis tous les champs'); return; }

    btn.disabled = true;
    btn.textContent = '...';

    if (mode === 'login') {
      const { error } = await sb.auth.signInWithPassword({ email, password });
      if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Se connecter'; return; }
      window.location.href = 'app.html';
    } else {
      const agency = document.getElementById('agency').value.trim();
      const { data, error } = await sb.auth.signUp({
        email, password,
        options: { data: { agency_name: agency || email.split('@')[0] } }
      });
      if (error) { showError(error.message); btn.disabled = false; btn.textContent = 'Créer mon compte'; return; }
      showSuccess('Compte créé ! Vérifie ton email pour confirmer. 📧');
      btn.disabled = false;
      btn.textContent = 'Créer mon compte';
    }
  }

  async function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError('Entre ton email d\'abord'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://flymagency.github.io/SpottedOF/reset-password.html' });
    if (error) showError(error.message);
    else showSuccess('Email de réinitialisation envoyé ! 📧');
  }

  function showError(msg) { const el = document.getElementById('alertError'); el.textContent = msg; el.style.display = 'block'; }
  function showSuccess(msg) { const el = document.getElementById('alertSuccess'); el.textContent = msg; el.style.display = 'block'; }
  function hideAlerts() { document.getElementById('alertError').style.display = 'none'; document.getElementById('alertSuccess').style.display = 'none'; }
</script>
</body>
</html>
