<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SpottedOF — Connexion</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..900&family=Space+Mono:wght@400;700&family=Outfit:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #060608;
      --surface: #0C0C0F;
      --surface2: #111115;
      --border: rgba(255,255,255,0.07);
      --border-focus: rgba(6,182,212,0.4);
      --accent: #06B6D4;
      --accent-light: #22D3EE;
      --text: #FFFFFF;
      --text-2: #9898A8;
      --text-3: #484858;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
      background-image:
        radial-gradient(ellipse 80% 60% at 50% -10%, rgba(6,182,212,0.08) 0%, transparent 70%),
        radial-gradient(circle, rgba(255,255,255,0.025) 1px, transparent 1px);
      background-size: 100% 100%, 28px 28px;
    }

    @keyframes cardIn {
      from { opacity: 0; transform: perspective(600px) translateY(28px) rotateX(8deg); }
      to   { opacity: 1; transform: perspective(600px) translateY(0)    rotateX(0deg); }
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 44px 40px;
      width: 100%;
      max-width: 380px;
      position: relative;
      z-index: 1;
      animation: cardIn 0.65s cubic-bezier(0.16,1,0.3,1) 0.1s both;
    }

    .logo {
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 36px;
    }

    .logo-text {
      font-family: 'Outfit', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.02em;
    }

    .logo-text span {
      color: var(--accent);
    }

    .heading {
      font-family: 'Outfit', sans-serif;
      font-size: 26px;
      font-weight: 900;
      color: var(--text);
      letter-spacing: -0.03em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-2);
      margin-bottom: 32px;
    }

    .alert {
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 13px;
      margin-bottom: 20px;
      display: none;
    }

    .alert-error {
      background: rgba(6,182,212,0.06);
      border: 1px solid rgba(6,182,212,0.15);
      color: #f87171;
    }

    .alert-success {
      background: rgba(6,182,212,0.08);
      border: 1px solid rgba(6,182,212,0.2);
      color: var(--accent);
    }

    .form-group { margin-bottom: 20px; }

    .form-label {
      font-size: 10px;
      color: var(--text-3);
      font-family: 'Space Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 8px;
      display: block;
    }

    .form-input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 13px 14px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px rgba(6,182,212,0.08);
    }

    .form-input::placeholder { color: var(--text-3); }

    .btn {
      width: 100%;
      padding: 14px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      margin-top: 4px;
    }

    .btn-primary {
      background: var(--accent);
      color: #060608;
    }

    .btn-primary:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    .btn-primary:disabled {
      opacity: 0.45;
      cursor: not-allowed;
      transform: none;
    }

    .forgot-wrap {
      text-align: center;
      margin-top: 18px;
    }

    .forgot-wrap a {
      font-size: 13px;
      color: var(--text-2);
      text-decoration: none;
      font-family: 'Inter', sans-serif;
      transition: color 0.15s;
    }

    .forgot-wrap a:hover { color: var(--text); }

    .register-wrap {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: var(--text-3);
    }

    .register-wrap a {
      color: var(--accent);
      font-weight: 600;
      text-decoration: none;
    }

    .register-wrap a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">
    <div class="logo-text">Spotted<span>OF</span></div>
  </div>

  <div class="heading">Connexion</div>
  <div class="subtitle">Content de te revoir.</div>

  <div id="alertError" class="alert alert-error"></div>
  <div id="alertSuccess" class="alert alert-success"></div>

  <div class="form-group">
    <label class="form-label">Email</label>
    <input type="email" class="form-input" id="email" placeholder="ton@email.com">
  </div>
  <div class="form-group">
    <label class="form-label">Mot de passe</label>
    <input type="password" class="form-input" id="password" placeholder="••••••••" onkeydown="if(event.key==='Enter')submit()">
  </div>

  <button class="btn btn-primary" id="submitBtn" onclick="submit()">Se connecter</button>

  <div class="forgot-wrap">
    <a href="#" onclick="forgotPassword(); return false;">Mot de passe oublié ?</a>
  </div>
  <div class="register-wrap">
    Pas de compte ? <a href="register.html">Créer le mien →</a>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://nsvrkogwmzrbjrtbphpb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_x7QwXgNepnb6t_2LCMniqw_zIEZ2LnR';
  const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'app.html';
  });

  async function submit() {
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn = document.getElementById('submitBtn');
    hideAlerts();

    if (!email || !password) { showError('Remplis tous les champs'); return; }

    btn.disabled = true;
    btn.textContent = '...';

    const { error } = await sb.auth.signInWithPassword({ email, password });
    if (error) {
      showError(error.message);
      btn.disabled = false;
      btn.textContent = 'Se connecter';
      return;
    }
    window.location.href = 'app.html';
  }

  async function forgotPassword() {
    const email = document.getElementById('email').value.trim();
    if (!email) { showError("Entre ton email d'abord"); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://flymagency.github.io/SpottedOF/reset-password.html' });
    if (error) showError(error.message);
    else showSuccess('Email de réinitialisation envoyé !');
  }

  function showError(msg) { const el = document.getElementById('alertError'); el.textContent = msg; el.style.display = 'block'; }
  function showSuccess(msg) { const el = document.getElementById('alertSuccess'); el.textContent = msg; el.style.display = 'block'; }
  function hideAlerts() { document.getElementById('alertError').style.display = 'none'; document.getElementById('alertSuccess').style.display = 'none'; }
</script>
</body>
</html>
